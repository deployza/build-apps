options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  DOCKER_PATH: 'asia-south1-docker.pkg.dev/${PROJECT_ID}/docker-repository'
  
steps:
  - name: '${DOCKER_PATH}/maven-docker:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "***** Stop on any error..."
        set -e  
        echo "***** Convert sh files from DOS to Unix ..."
        dos2unix ./setup-maven.sh ./tag-source.sh
        echo "**** Making sh files executable ..."
        chmod +x ./setup-maven.sh ./tag-source.sh
        echo "**** Running setup-maven.sh..."
        ./setup-maven.sh
        echo "***** Run maven..."
        mvn -B -s /workspace/.m2/settings.xml -Dmaven.repo.local=/workspace/.m2 clean deploy

  - name:  gcr.io/cloud-builders/git
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "***** Stop on any error..."
        set -e
        echo "**** Running tag-source.sh..."
        ./tag-source.sh